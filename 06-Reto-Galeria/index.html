<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reto CSS Grid - Galería</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="contenedor">
      <header class="header-galeria">
        <h1>Explora el Mundo</h1>
        <p>Una galería responsive impulsada por CSS Grid</p>
      </header>

      <div class="galeria">
        <div class="item destacado-h">
          <img
            src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=800&q=80"
            alt="Naturaleza 1"
          />
        </div>
        <div class="item">
          <img
            src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=800&q=80"
            alt="Naturaleza 2"
          />
        </div>
        <div class="item destacado-v">
          <img
            src="https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=800&q=80"
            alt="Naturaleza 3"
          />
        </div>
        <div class="item">
          <img
            src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=800&q=80"
            alt="Naturaleza 4"
          />
        </div>
        <div class="item">
          <img
            src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80"
            alt="Naturaleza 5"
          />
        </div>
        <div class="item destacado-h">
          <img
            src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?auto=format&fit=crop&w=800&q=80"
            alt="Naturaleza 6"
          />
        </div>
      </div>
    </main>
  </body>
</html>
